services:
  serverest:
    image: paulogoncalvesbh/serverest:latest
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000']
      interval: 5s
      timeout: 3s
      retries: 10

  tests:
    build: .
    depends_on:
      serverest:
        condition: service_healthy
    environment:
      - BASE_URL=http://serverest:3000
      - NODE_TLS_REJECT_UNAUTHORIZED=0
